<!DOCTYPE html>
<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}braindump{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <script src="/static/app.js"></script>
