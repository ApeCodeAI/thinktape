version: "3.8"

services:
  braindump:
    build: .
    container_name: braindump
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${BRAINDUMP_DATA_DIR:-./data}:/data
    environment:
      - BRAINDUMP_DATA_DIR=/data
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Uncomment to run specific services:
    # command: uv run python -m braindump web    # Web only
    # command: uv run python -m braindump bot    # Bot only
