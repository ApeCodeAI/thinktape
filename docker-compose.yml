# thinktape — one-command startup
#
# Usage:
#   1. Create your data dir + config:
#        mkdir -p ~/thinktape-data
#        cp config.example.toml ~/thinktape-data/config.toml
#        # edit ~/thinktape-data/config.toml with your Telegram credentials
#   2. (Optional) export MOONSHOT_API_KEY for AI summarization
#   3. docker compose up -d

services:
  thinktape:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/apecodeai/thinktape:latest
    container_name: thinktape
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      THINKTAPE_DATA_DIR: /data
      BRAINDUMP_DATA_DIR: /data    # backward compat
      # Optional: AI summarization (Kimi / OpenAI-compatible)
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      # Your raw items + config + sqlite index + bot session.
      # Override with: THINKTAPE_DATA_DIR=/abs/path docker compose up -d
      - ${THINKTAPE_DATA_DIR:-${BRAINDUMP_DATA_DIR:-${HOME}/thinktape-data}}:/data
      # Persist whisper model cache so it's not re-downloaded on each rebuild
      - thinktape-models:/root/.cache/huggingface

volumes:
  thinktape-models:
